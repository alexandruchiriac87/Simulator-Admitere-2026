<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulator Admitere Liceu 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0E1A;--panel:#151928;--border:rgba(255,255,255,.1);--ink:#E4E4E7;--ink2:#A1A1AA;--acc:#818CF8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,5vw,44px);text-align:center;margin-bottom:12px}
h1 span{color:var(--acc)}
p.sub{color:var(--ink2);text-align:center;max-width:520px;margin-bottom:40px;line-height:1.6}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:800px}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:28px;width:280px;text-decoration:none;color:var(--ink);transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--acc);transform:translateY(-2px)}
.card .emoji{font-size:32px;margin-bottom:12px;display:block}
.card h2{font-family:'Syne',sans-serif;font-size:19px;margin-bottom:8px}
.card p{color:var(--ink2);font-size:13.5px;line-height:1.5}
.card .n{color:var(--acc);font-weight:700}
footer{margin-top:48px;color:var(--ink2);font-size:12px;text-align:center}
footer a{color:var(--acc);text-decoration:none}
</style>
</head>
<body>
<h1>Câte șanse ai la <span>liceul dorit?</span></h1>
<p class="sub">Alege județul pentru a-ți compara media EN 2026 cu mediile reale de admitere, pe baza datelor oficiale.</p>
<div class="cards">
  <a class="card" href="bucuresti-ilfov/index.html">
    <span class="emoji">🏙️</span>
    <h2>București + Ilfov</h2>
    <p><span class="n">362</span> specializări · <span class="n">13.409</span> candidați EN 2026</p>
  </a>
  <a class="card" href="brasov/index.html">
    <span class="emoji">⛰️</span>
    <h2>Brașov</h2>
    <p><span class="n">168</span> specializări · <span class="n">4.446</span> candidați EN 2026</p>
  </a>
</div>
<footer>Dezvoltat de <a href="https://www.linkedin.com/in/chiriacalexandru1987/" target="_blank" rel="noopener">Alexandru Chiriac</a></footer>
</body>
</html>
